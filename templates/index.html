<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegios Unidos · Certificados</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Anton&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="header">
  <h1>COLEGIOS UNIDOS <span>·</span> 2° ENCUENTRO</h1>
  <div class="sub">IA y bienestar en el mapa escolar</div>
</div>

<div class="container">
  <div class="card" id="step1">
    <h2>Tu certificado</h2>
    <p class="desc">Ingresá el email con el que te registraste para buscar tu certificado.</p>
    <form id="formEmail" class="form">
      <input type="email" id="inputEmail" placeholder="tu@email.com" required autofocus>
      <button type="submit">Buscar</button>
    </form>
    <p class="error" id="errorMsg"></p>
  </div>

  <div class="card hidden" id="stepConfirm">
    <h2>Confirmación</h2>
    <p class="desc">Encontramos este registro. ¿Sos vos?</p>
    <div class="confirm-box">
      <div class="confirm-icon">👤</div>
      <div class="confirm-info">
        <div class="confirm-name" id="confirmNombre"></div>
        <div class="confirm-email" id="confirmEmail"></div>
      </div>
    </div>
    <div class="confirm-actions">
      <button id="btnSi" class="btn btn-primary">Sí, soy yo</button>
      <button id="btnNo" class="btn btn-secondary">No, no soy yo</button>
    </div>
    <div class="back-link">
      <button id="btnVolverConfirm" class="btn btn-back">← Volver</button>
    </div>
    <p class="error" id="confirmError"></p>
  </div>

  <div class="card hidden" id="stepCert">
    <div class="info-bar">
      <span class="badge" id="badgeLote"></span>
      <span id="nombreDisplay"></span>
    </div>
    <div class="cert-wrapper">
      <img id="certImg" alt="Certificado">
    </div>
    <div class="actions">
      <a id="btnDescargar" class="btn btn-primary" download>Descargar certificado</a>
      <a id="btnLinkedin" class="btn btn-linkedin" target="_blank" rel="noopener">Compartir en LinkedIn</a>
    </div>
    <div class="back-link">
      <button id="btnVolver" class="btn btn-back">← Volver</button>
    </div>
    <p class="msg" id="statusMsg"></p>
  </div>
</div>

<script>
const form = document.getElementById('formEmail');
const input = document.getElementById('inputEmail');
const errorMsg = document.getElementById('errorMsg');
const confirmError = document.getElementById('confirmError');
const step1 = document.getElementById('step1');
const stepConfirm = document.getElementById('stepConfirm');
const stepCert = document.getElementById('stepCert');
const confirmNombre = document.getElementById('confirmNombre');
const confirmEmail = document.getElementById('confirmEmail');
const certImg = document.getElementById('certImg');
const nombreDisplay = document.getElementById('nombreDisplay');
const badgeLote = document.getElementById('badgeLote');
const btnDescargar = document.getElementById('btnDescargar');
const btnEnviar = document.getElementById('btnEnviar');
const btnLinkedin = document.getElementById('btnLinkedin');
const btnSi = document.getElementById('btnSi');
const btnNo = document.getElementById('btnNo');
const statusMsg = document.getElementById('statusMsg');

let currentEmail = '';
let currentData = null;

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.textContent = '';
  confirmError.textContent = '';
  statusMsg.textContent = '';
  const email = input.value.trim();
  if (!email) return;

  try {
    const res = await fetch('/api/verificar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      errorMsg.textContent = errData.error || 'Email no encontrado. Verificá que sea el mismo con el que te registraste.';
      return;
    }

    currentData = await res.json();
    currentEmail = email;

    confirmNombre.textContent = currentData.nombre;
    confirmEmail.textContent = email;

    step1.classList.add('hidden');
    stepConfirm.classList.remove('hidden');
  } catch {
    errorMsg.textContent = 'Error de conexión. Intentalo de nuevo.';
  }
});

btnSi.addEventListener('click', async () => {
  stepConfirm.classList.add('hidden');
  const email = currentEmail;

  nombreDisplay.textContent = currentData.nombre;
  if (badgeLote) badgeLote.style.display = 'none';

  const imgUrl = `/api/certificado?email=${encodeURIComponent(email)}`;
  certImg.src = imgUrl;
  certImg.onload = () => {
    stepCert.classList.remove('hidden');
  };

  btnDescargar.href = imgUrl;
  btnDescargar.download = `certificado_${currentData.nombre.replace(/\s+/g, '_')}.png`;

  const shareRes = await fetch(`/api/share-url?email=${encodeURIComponent(email)}`);
  if (shareRes.ok) {
    const shareData = await shareRes.json();
    btnLinkedin.href = shareData.url;
  }


});

btnNo.addEventListener('click', () => {
  stepConfirm.classList.add('hidden');
  step1.classList.remove('hidden');
  input.value = '';
  input.focus();
  errorMsg.textContent = 'Si no sos vos, verificá el email e intentá de nuevo.';
});

document.getElementById('btnVolver').addEventListener('click', () => {
  stepCert.classList.add('hidden');
  step1.classList.remove('hidden');
  input.value = '';
  input.focus();
  statusMsg.textContent = '';
});

document.getElementById('btnVolverConfirm').addEventListener('click', () => {
  stepConfirm.classList.add('hidden');
  step1.classList.remove('hidden');
  input.value = '';
  input.focus();
  errorMsg.textContent = '';
});

input.addEventListener('input', () => {
  errorMsg.textContent = '';
  confirmError.textContent = '';
  statusMsg.textContent = '';
});
</script>
</body>
</html>
